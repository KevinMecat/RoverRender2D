name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test (.NET 10 / Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore locked dependencies
        run: dotnet restore RoverRender2D.sln --locked-mode

      - name: Verify formatting
        run: dotnet format RoverRender2D.sln --verify-no-changes --no-restore

      - name: Build Release
        run: dotnet build RoverRender2D.sln -c Release --no-restore

      - name: Test with coverage
        run: dotnet test RoverRender2D.sln -c Release --no-build --logger trx --results-directory TestResults --collect "XPlat Code Coverage"

      - name: Publish desktop artifact
        run: dotnet publish src/RoverRender2D.Desktop/RoverRender2D.Desktop.csproj -c Release --no-restore -o artifacts/RoverRender2D-win-x64

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

      - name: Upload desktop build
        uses: actions/upload-artifact@v7
        with:
          name: RoverRender2D-win-x64
          path: artifacts/RoverRender2D-win-x64/
          if-no-files-found: error

